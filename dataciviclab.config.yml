# Agent Context Builder — DataCivicLab configuration
#
# Generates compact context for Lab agents from GitHub.
# Local git state is optional: set DATACIVICLAB_WORKSPACE or pass --workspace-root.
#
# Usage (GitHub-only, no local checkout required):
#   agent-context build --config dataciviclab.config.yml --out generated/
#
# Usage (with local checkout):
#   agent-context build --config dataciviclab.config.yml --out generated/ \
#     --workspace-root ~/dev/dataciviclab-workspace

github_org: dataciviclab

repos:
  - agent-context-builder
  - dataset-incubator
  - dataciviclab
  - toolkit
  - data-explorer
  - source-observatory

# Hint operativi per agenti — descrivono flussi, non repo o dataset
# (repo descriptions vengono da GitHub API, dataset da clean_catalog)
topics:
  pipeline:
    summary: Ciclo di vita del dato — RAW → CLEAN → MART con toolkit
    repos:
      - toolkit
      - dataset-incubator
    paths:
      - toolkit/docs/
      - dataset-incubator/workflows/post-merge-candidate.md
    next: Vedi post-merge-candidate.md per il flusso completo run + push GCS

  governance:
    summary: Flusso operativo del Lab — intake, promozione, issues, PR, discussions
    repos:
      - dataciviclab
      - dataset-incubator
    paths:
      - dataciviclab/docs/workflows.md
      - dataciviclab/docs/dataset-project-flow.md
      - dataset-incubator/PROMOTION_CHECKLIST.md
    next: Vedi dataset-project-flow.md per il ciclo intake → promozione
