# Agent Context Builder — DataCivicLab configuration
#
# Generates compact context for Lab agents from GitHub.
# Local git state is optional: set DATACIVICLAB_WORKSPACE or pass --workspace-root.
#
# Usage (GitHub-only, no local checkout required):
#   agent-context build --config examples/dataciviclab.config.yml --out generated/
#
# Usage (with local checkout):
#   agent-context build --config examples/dataciviclab.config.yml --out generated/ \
#     --workspace-root ~/dev/dataciviclab-workspace

github_org: dataciviclab

repos:
  - agent-context-builder
  - dataset-incubator
  - dataciviclab
  - toolkit
  - data-explorer
  - source-observatory
  - lab-ops

topics:
  agent-context-builder:
    summary: Autonomous context generation for agents — bootstrap, triage, topic index
    repos:
      - agent-context-builder
    paths:
      - agent-context-builder/README.md
      - agent-context-builder/pyproject.toml
    next: Review P1 roadmap (telemetry summarizer, JSON schema, API backend)

  toolkit:
    summary: Core data pipeline engine — RAW → CLEAN → MART layer
    repos:
      - toolkit
    paths:
      - toolkit/docs/
      - toolkit/src/
    next: Check toolkit/docs/config-schema.md for dataset config contract

  datasets:
    summary: Dataset incubation and published analyses
    repos:
      - dataset-incubator
      - dataciviclab
    paths:
      - dataset-incubator/
      - dataciviclab/analisi/
    next: Review dataset-incubator/PROMOTION_CHECKLIST.md

  analytics:
    summary: Published analytical findings and documentation
    repos:
      - dataciviclab
    paths:
      - dataciviclab/docs/
    next: Check dataciviclab/docs/workflows.md for publication flow
