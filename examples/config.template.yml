# agent-context-builder configuration template
#
# Copy this file, fill in your org and repos, and run:
#   agent-context build --config your-org.config.yml --out generated/
#
# Local git state is optional.
# Set YOUR_WORKSPACE env var or pass --workspace-root to enable it.

github_org: your-org

repos:
  - repo-one
  - repo-two
  - repo-three

# Optional source-observatory inventory artifact. Leave unset until your org publishes
# a stable source_catalog_summary.json and wants Source Inventory in generated outputs.
# source_catalog_summary_path: data/catalog_inventory/generated/source_catalog_summary.json

# Topics provide semantic grouping for faster agent orientation.
# Each topic maps to a set of repos and paths, with a summary and suggested next step.
topics:
  example-topic:
    summary: Brief description of what this topic covers
    repos:
      - repo-one
    paths:
      - repo-one/docs/
      - repo-one/src/
    next: What an agent should read or do first for this topic
